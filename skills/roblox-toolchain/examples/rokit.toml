# Example Rokit toolchain manifest. Drop-in compatible with foreman.toml /
# aftman.toml — same `[tools]` section, same OWNER/REPO@VERSION spec.
# Commit this file. Run `rokit install` after cloning.

[tools]
# Core sync + build
rojo = "rojo-rbx/rojo@7.5.1"

# Package manager (pick one — Wally for now)
wally = "UpliftGames/wally@0.3.2"
# pesde = "pesde-pkg/pesde@0.7.0"   # uncomment if you've migrated to pesde

# Formatter
stylua = "JohnnyMorganz/StyLua@2.0.0"

# Linter
selene = "Kampfkarren/selene@0.27.1"

# Language server (CLI mode + editor LSP)
luau-lsp = "JohnnyMorganz/luau-lsp@1.32.0"

# Optional: documentation generator
# moonwave = "evaera/moonwave@1.1.0"

# Optional: place file uploader
# mantle = "edward3h/mantle@0.11.4"
